<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>ChitChat - E-posta Doğrulama</title>
  <link rel="stylesheet" href="style2.css">
</head>

<body class="login-body">

  <div class="login-box verify-box">

    <div class="verify-icon">📧</div>
    <h1>E-postanı Doğrula</h1>

    <p>
      <span id="emailText" class="email-highlight"></span> adresine bir doğrulama bağlantısı gönderdik.<br><br>
      E-postanı kontrol edip bağlantıya tıkla, ardından aşağıdaki butona bas.
    </p>

    <p id="statusMsg"></p>
    <p id="timer"></p>

    <button id="resendBtn">Tekrar Gönder</button>
    <button id="checkBtn">✓ Doğruladım, Devam Et</button>

    <div class="logout-link">
      Yanlış hesap mı? <a href="#" id="logoutLink">Çıkış Yap</a>
    </div>

  </div>

  <script type="module">
    import { auth } from "./firebase.js";
    import {
      onAuthStateChanged,
      sendEmailVerification,
      reload,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const statusMsg  = document.getElementById("statusMsg");
    const timerEl   = document.getElementById("timer");
    const resendBtn  = document.getElementById("resendBtn");
    const checkBtn   = document.getElementById("checkBtn");
    const emailText  = document.getElementById("emailText");
    const logoutLink = document.getElementById("logoutLink");

    let currentUser  = null;
    let countdown    = null;

    function startCooldown() {
      resendBtn.disabled = true;
      let secs = 15;
      timerEl.innerText = `Tekrar göndermek için ${secs} saniye bekle`;
      countdown = setInterval(() => {
        secs--;
        if (secs <= 0) {
          clearInterval(countdown);
          resendBtn.disabled = false;
          timerEl.innerText = "";
        } else {
          timerEl.innerText = `Tekrar göndermek için ${secs} saniye bekle`;
        }
      }, 1000);
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.replace("login.html");
        return;
      }

      // Zaten doğrulanmışsa direkt geç
      await reload(user);
      if (user.emailVerified) {
        window.location.replace("index.html");
        return;
      }

      currentUser = user;
      emailText.innerText = user.email;

      // Sayfa ilk açıldığında cooldown başlat
      // (kayıt sırasında zaten bir mail gönderildi)
      startCooldown();
    });

    resendBtn.onclick = async () => {
      if (!currentUser) return;
      try {
        await sendEmailVerification(currentUser);
        statusMsg.style.color = "#4ade80";
        statusMsg.innerText = "Doğrulama e-postası tekrar gönderildi!";
        startCooldown();
      } catch (e) {
        statusMsg.style.color = "#f87171";
        statusMsg.innerText = "Gönderilemedi: " + e.message;
      }
    };

    checkBtn.onclick = async () => {
      if (!currentUser) return;
      await reload(currentUser);
      if (currentUser.emailVerified) {
        window.location.replace("index.html");
      } else {
        statusMsg.style.color = "#f87171";
        statusMsg.innerText = "Henüz doğrulanmamış. E-postanı kontrol et.";
      }
    };

    logoutLink.onclick = async (e) => {
      e.preventDefault();
      await signOut(auth);
      window.location.replace("login.html");
    };
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kullanıcı Ara</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .search-container {
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .search-box {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-box input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }

    .search-box input:focus {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.1);
    }

    .search-box input::placeholder {
      color: #94a3b8;
    }

    .results-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .user-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .user-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(102, 126, 234, 0.5);
      transform: translateX(4px);
    }

    .user-avatar-small {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .user-avatar-small img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .user-info {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
      color: #e2e8f0;
    }

    .user-email {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .user-bio {
      font-size: 12px;
      color: #cbd5e1;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .user-status {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
    }

    .status-badge {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
    }

    .status-badge.offline {
      background: #64748b;
    }

    .empty-state {
      text-align: center;
      color: #475569;
      font-size: 14px;
      padding: 40px 20px;
      line-height: 1.7;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .top-bar button {
      background: none;
      border: none;
      color: #e2e8f0;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .no-results {
      text-align: center;
      color: #94a3b8;
      padding: 32px 20px;
    }
  </style>
</head>
<body class="login-body">

  <div class="app">
    <!-- Top Bar -->
    <div class="top-bar">
      <button id="backBtn" title="Geri dön">←</button>
      <h1 style="flex: 1; text-align: center; margin: 0; font-size: 18px;">Kullanıcı Ara</h1>
      <div style="width: 40px;"></div>
    </div>

    <!-- Search Box -->
    <div class="search-container">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Ad, e-posta yada kullanıcı no ara...">
        <button id="clearBtn" style="background: none; border: none; color: #94a3b8; cursor: pointer; padding: 8px; font-size: 18px;">✕</button>
      </div>
    </div>

    <!-- Results -->
    <div class="results-container">
      <div class="empty-state">
        <div class="empty-state-icon">🔍</div>
        <p>Kullanıcı aramak için bir ad veya e-posta girin</p>
      </div>
    </div>
  </div>

  <!-- User Profile Modal -->
  <div id="profileModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 9999; padding: 20px; overflow-y: auto;">
    <div style="background: #1e293b; border: 1px solid #334155; border-radius: 20px; max-width: 500px; margin: 20px auto; padding: 24px;">
      <!-- Modal content will be inserted here -->
    </div>
  </div>

  <script type="module" src="search-users.js"></script>

</body>
</html>

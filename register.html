<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChitChat Register</title>
  <link rel="stylesheet" href="style2.css">
</head>

<body class="login-body">
  
  <div class="login-box">
    
    <h1>Hesap Oluştur</h1>
    
    <input type="text"     id="nickname"  placeholder="Nickname">
    <input type="text"     id="email"     placeholder="E-posta">
    <input type="password" id="password"  placeholder="Şifre">
    
    <div class="passwordBar">
      <div id="bar"></div>
    </div>

    <p id="error" style="color:#f87171; font-size:13px; margin-bottom:12px; min-height:18px;"></p>
    
    <button id="registerBtn">Kayıt Ol</button>

    <div style="display: flex; align-items: center; margin: 15px 0; gap: 10px;">
      <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.2);"></div>
      <span style="font-size: 12px; color: #94a3b8;">veya</span>
      <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.2);"></div>
    </div>

    <button type="button" class="google-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span>Google ile Kayıt Ol</span>
    </button>
    
    <div class="createAccount">
      Zaten hesabın var mı?
      <a href="login.html">Giriş Yap</a>
    </div>
    
  </div>
  
  <script type="module">
    import { auth, db } from "./firebase.js";
    import {
      createUserWithEmailAndPassword,
      sendEmailVerification,
      signInWithPopup,
      GoogleAuthProvider
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import {
      doc,
      setDoc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const passwordInput = document.getElementById("password");
    const bar           = document.getElementById("bar");
    const btn           = document.getElementById("registerBtn");
    const googleBtn     = document.getElementById("googleBtn");
    const errorEl       = document.getElementById("error");

    let passwordValid = false;

    passwordInput.addEventListener("input", () => {
      const pass      = passwordInput.value;
      const lengthOk  = pass.length >= 8;
      const specialOk = /[!@#$%^&*(),.?":{}|<>]/.test(pass);

      let strength = 0;
      if (pass.length >= 4)                       strength += 25;
      if (pass.length >= 8)                       strength += 25;
      if (/[A-Z]/.test(pass))                     strength += 25;
      if (/[!@#$%^&*(),.?":{}|<>]/.test(pass))   strength += 25;

      bar.style.width      = strength + "%";
      bar.style.background = strength < 50 ? "red" : strength < 75 ? "orange" : "lime";

      passwordValid = lengthOk && specialOk;
    });

    btn.onclick = async () => {
      const nickname = document.getElementById("nickname").value.trim();
      const email    = document.getElementById("email").value.trim();
      const password = passwordInput.value.trim();

      errorEl.innerText = "";

      if (!nickname || !email || !password) {
        errorEl.innerText = "Tüm alanları doldur";
        return;
      }

      if (!passwordValid) {
        errorEl.innerText = "Şifre en az 8 karakter ve özel karakter içermeli";
        return;
      }

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await sendEmailVerification(cred.user);

        const userNo = Math.floor(Math.random() * 900000) + 100000;

        await setDoc(doc(db, "users", cred.user.uid), {
          nickname:    nickname,
          email:       email,
          userNo:      userNo,
          passwordSet: true,
          createdAt:   Date.now()
        });

        // email localStorage'a kaydedilmeli ki verify sonrası çalışsın
        localStorage.setItem("email",    email);
        localStorage.setItem("nickname", nickname);
        localStorage.setItem("userNo",   String(userNo));

        window.location.replace("verify.html");

      } catch (e) {
        if (e.code === "auth/email-already-in-use") {
          errorEl.innerText = "Bu e-posta zaten kayıtlı.";
        } else {
          errorEl.innerText = e.message;
        }
      }
    };

    googleBtn.onclick = async (e) => {
      e.preventDefault();
      errorEl.innerText = "";

      try {
        const provider = new GoogleAuthProvider();
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        const snap = await getDoc(doc(db, "users", user.uid));

        if (!snap.exists()) {
          const userNo = Math.floor(Math.random() * 900000) + 100000;
          await setDoc(doc(db, "users", user.uid), {
            nickname:    user.displayName || user.email.split("@")[0],
            email:       user.email,
            userNo:      userNo,
            passwordSet: false,
            createdAt:   Date.now()
          });

          localStorage.setItem("email",    user.email);
          localStorage.setItem("nickname", user.displayName || user.email.split("@")[0]);
          localStorage.setItem("userNo",   String(userNo));

          window.location.replace("setup.html");
          return;
        }

        const data = snap.data();
        localStorage.setItem("email",    user.email);
        localStorage.setItem("nickname", data.nickname || user.email.split("@")[0]);
        localStorage.setItem("userNo",   String(data.userNo || ""));

        window.location.replace("index.html");

      } catch (e) {
        if (e.code === "auth/popup-closed-by-user") {
          errorEl.innerText = "Giriş iptal edildi.";
        } else {
          errorEl.innerText = "Google ile kayıt başarısız: " + e.message;
        }
      }
    };
  </script>
  
</body>
</html>
